<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fegi & Taufik</title>

<!-- Open Graph -->
<meta property="og:title"
content="Fegi & Taufik">

<meta property="og:image"
content="https://inv.pleasurein.my.id/fegi-taufik/cover.jpg">

<meta property="og:image:type"
content="image/jpeg">

<meta property="og:image:width"
content="1080">

<meta property="og:image:height"
content="1350">

<meta property="og:url"
content="https://inv.pleasurein.my.id/fegi-taufik">

<meta property="og:type"
content="website">

<meta name="twitter:card"
content="summary_large_image">

<meta name="twitter:image"
content="https://inv.pleasurein.my.id/fegi-taufik/cover.jpg">
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
  color:#fff; /* semua text hitam */
}

body{
  background:#fff;
  overflow:hidden;
}

/* COVER */
.cover{
  position:fixed;
  inset:0;
  background:url('cover.jpg') center/cover no-repeat;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding:20px;
  padding-bottom:7vh;
}

/* CONTENT */
.content{
  position:relative;
  z-index:2;
  text-align:center;
}

/* TEXT */
.to{
  font-size:13px;
  margin-bottom:2px;
}

.sub{
  font-size:13px;
  margin-bottom:6px;
}

.guest{
  font-size:17px;
  font-weight:600;
  margin-bottom:14px;
}

/* BUTTON */
.btn{
  background:#600a0a;
  color:#fff;
  padding:11px 24px;
  border-radius:22px;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  display:inline-block;
}

/* MUSIC BUTTON */
.music-btn{
  position:fixed;
  bottom:18px;
  right:18px;
  width:42px;
  height:42px;
  background:rgba(255,255,255,.9);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:10;
}

.music-btn img{
  width:20px;
}
</style>
</head>

<body>

<!-- COVER -->
<div class="cover">
  <div class="content">
    <div class="to">Dear,</div>
    <div class="guest" id="guestName">Nama Tamu</div>
    <div class="btn" id="openBtn">Buka Undangan</div>
  </div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="music-btn" id="musicBtn" style="display:none;">
  <img id="musicIcon"
    src="https://cdn-icons-png.flaticon.com/512/727/727245.png">
</div>

<script>
// ======================
// AMBIL NAMA TAMU ?to=
// ======================
const params = new URLSearchParams(window.location.search);
const guest = params.get("to");
if(guest){
  document.getElementById("guestName").innerText =
    decodeURIComponent(guest.replace(/\+/g," "));
}

// ======================
// MUSIC CONTROL
// ======================
const music = document.getElementById("music");
const musicBtn = document.getElementById("musicBtn");
const icon = document.getElementById("musicIcon");

let isPlaying = false;

function playMusic(){
  music.play();
  isPlaying = true;
  musicBtn.style.display = "flex";
}

musicBtn.addEventListener("click",()=>{
  if(isPlaying){
    music.pause();
    icon.src="https://cdn-icons-png.flaticon.com/512/727/727240.png";
  }else{
    music.play();
    icon.src="https://cdn-icons-png.flaticon.com/512/727/727245.png";
  }
  isPlaying = !isPlaying;
});

// ======================
// OPEN LINK
// ======================
document.getElementById("openBtn").addEventListener("click",()=>{
  playMusic();

  setTimeout(()=>{
    window.open(
      "https://pleasurein.my.id/fegi-taufik",
      "_blank"
    );
  }, 300);
});
</script>

</body>
</html>
