<head>

<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Special Elite', cursive;
}

body{
  background:#000;
  overflow:hidden;
}

/* COVER */
.cover{
  position:fixed;
  inset:0;
  background:url('cover.gif') center/cover no-repeat;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding:20px;
  padding-bottom:7vh;
}

/* CONTENT */
.content{
  position:relative;
  z-index:2;
  text-align:center;
}

/* TEXT */
.to{
  font-size:13px;
  margin-bottom:4px;
  color:#fff;
  letter-spacing:1px;
}

.guest{
  font-size:18px;
  margin-bottom:16px;
  color:#fff;
  line-height:1.5;
  text-shadow:0 2px 8px rgba(0,0,0,.35);
}

/* BUTTON */
.btn{
  background:#fff;
  color:#000;
  padding:12px 28px;
  border-radius:30px;
  font-size:13px;
  cursor:pointer;
  display:inline-block;
  transition:.3s;
  box-shadow:0 4px 14px rgba(0,0,0,.2);
}

.btn:hover{
  transform:scale(1.04);
}

/* MUSIC BUTTON */
.music-btn{
  position:fixed;
  bottom:18px;
  right:18px;
  width:42px;
  height:42px;
  background:rgba(255,255,255,.9);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:10;
}

.music-btn img{
  width:20px;
}
</style>
</head>

<body>

<!-- COVER -->
<div class="cover">
  <div class="content">
    <div class="to">Dear,</div>
    <div class="guest" id="guestName">Nama Tamu</div>
    <div class="btn" id="openBtn">Open Invitation</div>
  </div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="music-btn" id="musicBtn" style="display:none;">
  <img id="musicIcon"
    src="https://cdn-icons-png.flaticon.com/512/727/727245.png">
</div>

<script>
// ======================

let isPlaying = false;

function playMusic(){
  music.play();
  isPlaying = true;
  musicBtn.style.display = "flex";
}

musicBtn.addEventListener("click",()=>{
  if(isPlaying){
    music.pause();
    icon.src="https://cdn-icons-png.flaticon.com/512/727/727240.png";
  }else{
    music.play();
    icon.src="https://cdn-icons-png.flaticon.com/512/727/727245.png";
  }

  isPlaying = !isPlaying;
});

// ======================
// OPEN LINK

document.getElementById("openBtn").addEventListener("click",()=>{

  playMusic();

  setTimeout(()=>{
    window.open(
      "https://pleasurein.my.id/yuda-maya",
      "_blank"
    );
  },300);

});
</script>

</body>
</html>
