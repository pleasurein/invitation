<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Peni & Gema</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400;6..96,500;6..96,600;6..96,700&display=swap" rel="stylesheet">

<!-- Open Graph -->
<meta property="og:title"
content="Peni & Gema">

<meta property="og:image"
content="https://inv.pleasurein.my.id/peni-gema/og-cover.jpg">

<meta property="og:image:type"
content="image/jpeg">

<meta property="og:image:width"
content="1080">

<meta property="og:image:height"
content="1350">

<meta property="og:url"
content="https://inv.pleasurein.my.id/peni-gema">

<meta property="og:type"
content="website">

<meta name="twitter:card"
content="summary_large_image">

<meta name="twitter:image"
content="https://inv.pleasurein.my.id/peni-gema/og-cover.jpg">

<style>
	*{
	    margin:0;
	    padding:0;
	    box-sizing:border-box;
	}

	body{
	    background:#000;
	    overflow:hidden;
	    font-family: 'Bodoni Moda', serif;
	}

	/* COVER */

	.cover{
	    position:fixed;
	    inset:0;
	    background:
	    linear-gradient(to top,
	    rgba(0,0,0,.72) 0%,
	    rgba(0,0,0,.45) 35%,
	    rgba(0,0,0,.25) 100%),
	    url("cover.jpg") center center/cover no-repeat;

	    display:flex;
	    align-items:flex-end;
	    justify-content:flex-start;

		padding:34px;
		padding-bottom:14vh;
	}

	/* CONTENT */

	.content{
	    width:100%;
	    max-width:250px;
	    color:#cbb7a6;
	    animation:fadeUp .9s ease;
	    margin-left:6px;
	}

	/* SMALL TITLE */

	.label{

	    font-family:Arial;
		font-size:9px;
		letter-spacing:2px;
		margin-bottom:10px;
	    text-transform:uppercase;
		color:#cbb7a6;

	}

	/* NAME */

	.couple{

	    font-family:"Bodoni Moda",serif;

		font-size:40px;
		line-height:.92;
		margin-bottom:18px;
	    font-weight:300;
		color:#cbb7a6;
	}

	/* Dear */

	.to{

	    color:#cbb7a6;
		font-size:13px;
		margin-bottom:6px;

	}

	/* Guest */

	.guest{

		font-size:13px;
		margin-bottom:22px;
		font-weight:500;
		color:#fff;

	}

	/* BUTTON */

	.btn{

	display:inline-flex;

	align-items:center;

	gap:8px;

	padding-bottom:6px;

	border-bottom:2px solid #cbb7a6;;

	cursor:pointer;

	font-size:14px;

	font-weight:600;

	color:#cbb7a6;

	transition:.3s;

	}

	.btn:hover{

	transform:translateY(-2px);

	opacity:.8;

	}

	.btn svg{

	width:18px;

	height:18px;

	fill:#cbb7a6;

	}

	/* MUSIC */

	.music-btn{

	position:fixed;

	right:20px;

	bottom:20px;

	width:48px;

	height:48px;

	border-radius:50%;

	background:rgba(255,255,255,.9);

	display:flex;

	align-items:center;

	justify-content:center;

	z-index:999;

	display:none;

	}

	.music-btn img{

	width:22px;

	}

	/* Animation */

	@keyframes fadeUp{

	from{

	opacity:0;

	transform:translateY(40px);

	}

	to{

	opacity:1;

	transform:translateY(0);

	}

	}
</style>
</head>

<body>

<!-- COVER -->
<div class="cover">
<div class="content">

<div class="label">
THE WEDDING OF
</div>

<div class="couple">
PENI &
</div>
<div class="couple">
GEMA
</div>

<div class="to">
Dear,
</div>

<div class="guest" id="guestName">
Nama Tamu
</div>

<div class="btn" id="openBtn">

<svg viewBox="0 0 24 24">
<path d="M2 6v12h20V6H2zm18 2l-8 5-8-5V7l8 5 8-5v1z"/>
</svg>

<span>Buka Undangan</span>

</div>

</div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="music-btn" id="musicBtn" style="display:none;">
  <img id="musicIcon"
    src="https://cdn-icons-png.flaticon.com/512/727/727245.png">
</div>

<script>
// ======================
// AMBIL NAMA TAMU ?to=
// ======================
const params = new URLSearchParams(window.location.search);
const guest = params.get("to");
if(guest){
  document.getElementById("guestName").innerText =
    decodeURIComponent(guest.replace(/\+/g," "));
}

// ======================
// MUSIC CONTROL
// ======================
const music = document.getElementById("music");
const musicBtn = document.getElementById("musicBtn");
const icon = document.getElementById("musicIcon");

let isPlaying = false;

function playMusic(){
  music.play();
  isPlaying = true;
  musicBtn.style.display = "flex";
}

musicBtn.addEventListener("click",()=>{
  if(isPlaying){
    music.pause();
    icon.src="https://cdn-icons-png.flaticon.com/512/727/727240.png";
  }else{
    music.play();
    icon.src="https://cdn-icons-png.flaticon.com/512/727/727245.png";
  }
  isPlaying = !isPlaying;
});

// ======================
// OPEN LINK
// ======================
document.getElementById("openBtn").addEventListener("click",()=>{
  playMusic();

  setTimeout(()=>{
    window.open(
      "https://pleasurein.my.id/peni-gema",
      "_blank"
    );
  }, 300);
});
</script>

</body>
</html>
