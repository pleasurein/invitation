<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habiby & Nay</title>

<!-- Open Graph -->
<meta property="og:title"
content="Habiby & Nay">

<meta property="og:image"
content="https://inv.pleasurein.my.id/habiby-nay/cover.jpg">

<meta property="og:image:type"
content="image/jpeg">

<meta property="og:image:width"
content="1080">

<meta property="og:image:height"
content="1350">

<meta property="og:url"
content="https://inv.pleasurein.my.id/habiby-nay">

<meta property="og:type"
content="website">

<meta name="twitter:card"
content="summary_large_image">

<meta name="twitter:image"
content="https://inv.pleasurein.my.id/habiby-nay/cover.jpg">
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  margin:0;
  background:#fff;
}

/* COVER */
.cover{
  position:fixed;
  inset:0;
  background:url('cover.jpg') center/cover no-repeat;
  z-index:3;
}

/* CONTENT (INI YANG BENER) */
.cover-content{
  position:relative;
  z-index:2;
  height:100%;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding:16px;
}

/* BOX */
.card{
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(4px);
  border-radius:12px;
  padding:14px 12px;
  max-width:240px;
  width:100%;
  text-align:center;
  margin-bottom:20px;
  color:#000;
}

.to{
  font-size:11px;
  opacity:.7;
}

.guest{
  font-size:14px;
  font-weight:600;
  margin:6px 0 14px;
}

.btn{
  background:#000;
  color:#fff;
  padding:8px 18px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
}

/* MUSIC */
.music-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:38px;
  height:38px;
  background:rgba(255,255,255,.8);
  border-radius:50%;
  display:none;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:10;
}

.music-btn img{
  width:18px;
}
</style>
</head>

<body>

<!-- COVER -->
<div class="cover">
  <div class="cover-content">
    <div class="card">
      <div class="to">Kepada Yth.</div>
      <div class="guest" id="guestName">Tamu Undangan</div>
      <div class="btn" id="openBtn">Buka Undangan</div>
    </div>
  </div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="music-btn" id="musicBtn">
  <img id="musicIcon"
    src="https://cdn-icons-png.flaticon.com/512/727/727245.png">
</div>

<script>
// Nama tamu (?to=)
const params = new URLSearchParams(window.location.search);
const guest = params.get("to");

if(guest){
  document.getElementById("guestName").innerText =
    decodeURIComponent(guest.replace(/\+/g," "));
}

// MUSIC
const music = document.getElementById("music");
const musicBtn = document.getElementById("musicBtn");
const icon = document.getElementById("musicIcon");

let isPlaying = false;

function playMusic(){
  music.play().then(()=>{
    isPlaying = true;
    musicBtn.style.display = "flex";
  }).catch(()=>{});
}

musicBtn.addEventListener("click",()=>{
  if(isPlaying){
    music.pause();
    icon.src="https://cdn-icons-png.flaticon.com/512/727/727240.png";
  }else{
    playMusic();
    icon.src="https://cdn-icons-png.flaticon.com/512/727/727245.png";
  }
  isPlaying = !isPlaying;
});

// OPEN LINK (musik tetap jalan karena tab baru)
document.getElementById("openBtn").addEventListener("click",()=>{
  playMusic();

  setTimeout(()=>{
    window.open(
      "https://pleasurein.my.id/habiby-nay",
      "_blank"
    );
  }, 300);
});
</script>

</body>
</html>
